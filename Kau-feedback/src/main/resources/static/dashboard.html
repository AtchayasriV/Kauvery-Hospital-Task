<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Patient Feedback Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.container{
    margin-top:30px;
}

h1{
    color:#1a73e8;
    margin-bottom:30px;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.1);
}

th{
    background:#1a73e8 !important;
    color:white;
}

.table tbody tr:hover{
    background:#f1f5ff;
}

.badge{
    font-size:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>Patient Feedback Dashboard</h1>

<div class="row mb-4">

<div class="col-md-4">

<div class="card p-4 text-center">

<h4>Total Feedbacks</h4>

<h1 id="totalFeedback">0</h1>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 text-center">

<h4>Average Rating</h4>

<h1 id="avgRating">0</h1>

</div>

</div>

<div class="col-md-4">

<div class="card p-4 text-center">

<h4>Departments Covered</h4>

<h1 id="departments">0</h1>

</div>

</div>

</div>

<div class="card p-4">

<h2 class="mb-4">Feedback Records</h2>

<table class="table table-bordered table-hover">

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Department</th>
<th>Rating</th>
<th>Comments</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script>

function loadDashboard() {

fetch("/api/dashboard")

.then(response => response.json())

.then(data => {

document.getElementById("totalFeedback").innerHTML = data.length;

let totalRating = 0;
let deptSet = new Set();
let rows = "";

data.forEach(f => {

totalRating += f.rating;
deptSet.add(f.department);

rows += `
<tr>
<td>${f.id}</td>
<td>${f.patientName}</td>
<td>${f.age}</td>
<td>${f.department}</td>
<td>
<span class="badge bg-success">
${f.rating}/5
</span>
</td>
<td>${f.comments}</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML = rows;

document.getElementById("avgRating").innerHTML =
(data.length ? (totalRating / data.length).toFixed(1) : 0);

document.getElementById("departments").innerHTML =
deptSet.size;

});

}

// initial load
loadDashboard();

// auto refresh every 3 seconds
setInterval(loadDashboard, 3000);

</script>

</body>

</html>
